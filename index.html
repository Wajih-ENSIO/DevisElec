<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Export Devis</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap');

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Inter', system-ui, sans-serif;
    background: #f5f5f5;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 2rem;
    color: #1a1a1a;
  }

  .card {
    background: #fff;
    border-radius: 10px;
    border: 1px solid #e0e0e0;
    padding: 2rem;
    width: 100%;
    max-width: 460px;
    box-shadow: 0 2px 12px rgba(0,0,0,0.06);
  }

  .card-header {
    margin-bottom: 1.5rem;
  }

  .card-header h1 {
    font-size: 1.1rem;
    font-weight: 600;
    color: #1a1a1a;
  }

  .card-header p {
    font-size: 0.8rem;
    color: #888;
    margin-top: 0.25rem;
  }

  /* Drop zone */
  .dropzone {
    border: 1.5px dashed #d0d0d0;
    border-radius: 8px;
    padding: 2rem 1.5rem;
    text-align: center;
    cursor: pointer;
    transition: border-color 0.15s, background 0.15s;
    background: #fafafa;
    margin-bottom: 1rem;
  }

  .dropzone:hover, .dropzone.drag-over {
    border-color: #aaa;
    background: #f2f2f2;
  }

  .dropzone.has-file {
    border-color: #4caf82;
    border-style: solid;
    background: #f6fdf9;
  }

  .drop-icon { font-size: 1.6rem; margin-bottom: 0.5rem; }

  .drop-text-main {
    font-size: 0.9rem;
    font-weight: 500;
    color: #333;
    margin-bottom: 0.2rem;
  }

  .drop-text-sub {
    font-size: 0.75rem;
    color: #aaa;
  }

  input[type="file"] { display: none; }

  /* File info */
  .file-info {
    display: none;
    align-items: center;
    gap: 0.75rem;
    background: #f6fdf9;
    border: 1px solid #c3e6d4;
    border-radius: 8px;
    padding: 0.75rem 1rem;
    margin-bottom: 1rem;
  }

  .file-info.visible { display: flex; }

  .file-icon {
    font-size: 1.1rem;
    flex-shrink: 0;
  }

  .file-details { flex: 1; min-width: 0; }

  .file-name {
    font-size: 0.85rem;
    font-weight: 500;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .file-meta {
    font-size: 0.72rem;
    color: #888;
    margin-top: 0.1rem;
  }

  .file-remove {
    background: none;
    border: none;
    color: #bbb;
    cursor: pointer;
    font-size: 0.9rem;
    padding: 0.2rem 0.4rem;
    border-radius: 4px;
    transition: color 0.15s;
  }
  .file-remove:hover { color: #e05a5a; }

  /* Button */
  .btn {
    width: 100%;
    padding: 0.75rem;
    border: none;
    border-radius: 8px;
    background: #1a1a1a;
    color: #fff;
    font-family: inherit;
    font-size: 0.88rem;
    font-weight: 500;
    cursor: pointer;
    transition: background 0.15s, opacity 0.15s;
  }

  .btn:hover:not(:disabled) { background: #333; }
  .btn:disabled { opacity: 0.4; cursor: not-allowed; }

  /* Progress */
  .progress { display: none; margin-bottom: 1rem; }
  .progress.visible { display: block; }

  .progress-track {
    height: 3px;
    background: #eee;
    border-radius: 2px;
    overflow: hidden;
    margin-bottom: 0.4rem;
  }

  .progress-fill {
    height: 100%;
    background: #1a1a1a;
    width: 0%;
    transition: width 0.3s ease;
    border-radius: 2px;
  }

  .progress-label {
    font-size: 0.73rem;
    color: #999;
  }

  /* Status */
  .status {
    display: none;
    padding: 0.7rem 0.9rem;
    border-radius: 6px;
    font-size: 0.8rem;
    margin-bottom: 1rem;
    line-height: 1.5;
  }

  .status.visible { display: block; }
  .status.success { background: #f0faf5; color: #2e7d55; border: 1px solid #c3e6d4; }
  .status.error   { background: #fdf3f3; color: #c0392b; border: 1px solid #f5c6c6; }
</style>
</head>
<body>

<div class="card">
  <div class="card-header">
    <h1>Export Devis</h1>
    <p>Importe ton devis ici, Mehmet</p>
  </div>

  <div class="dropzone" id="dropzone">
    <div class="drop-icon">📂</div>
    <div class="drop-text-main">Glisse ton fichier ici</div>
    <div class="drop-text-sub">.xlsx ou .xls acceptés</div>
    <input type="file" id="fileInput" accept=".xlsx,.xls">
  </div>

  <div class="file-info" id="fileInfo">
    <span class="file-icon">📄</span>
    <div class="file-details">
      <div class="file-name" id="fileName">—</div>
      <div class="file-meta" id="fileMeta">—</div>
    </div>
    <button class="file-remove" id="fileRemove">✕</button>
  </div>

  <div class="progress" id="progress">
    <div class="progress-label" id="progressLabel">Chargement...</div>
    <div class="progress-track">
      <div class="progress-fill" id="progressFill"></div>
    </div>
  </div>

  <div class="status" id="statusBox"></div>

  <button class="btn" id="btnGenerate" disabled>Générer l'export</button>
</div>

// ── UI ──────────────────────────────────────────────────────────
let selectedFile = null;

const dropzone      = document.getElementById('dropzone');
const fileInput     = document.getElementById('fileInput');
const fileInfo      = document.getElementById('fileInfo');
const fileNameEl    = document.getElementById('fileName');
const fileMetaEl    = document.getElementById('fileMeta');
const fileRemove    = document.getElementById('fileRemove');
const btnGen        = document.getElementById('btnGenerate');
const progressEl    = document.getElementById('progress');
const progressFill  = document.getElementById('progressFill');
const progressLabel = document.getElementById('progressLabel');
const statusBox     = document.getElementById('statusBox');

const fmt = b => b < 1048576 ? (b/1024).toFixed(1)+' KB' : (b/1048576).toFixed(1)+' MB';

function setFile(file) {
  selectedFile = file;
  fileNameEl.textContent = file.name;
  fileMetaEl.textContent = fmt(file.size);
  dropzone.classList.add('has-file');
  fileInfo.classList.add('visible');
  btnGen.disabled = false;
  hideStatus();
}

function clearFile() {
  selectedFile = null;
  fileInput.value = '';
  dropzone.classList.remove('has-file');
  fileInfo.classList.remove('visible');
  btnGen.disabled = true;
  hideStatus();
}

function setProgress(pct, label) {
  progressEl.classList.add('visible');
  progressFill.style.width = pct + '%';
  progressLabel.textContent = label;
}

function hideProgress() {
  progressEl.classList.remove('visible');
  progressFill.style.width = '0%';
}

function showStatus(type, msg) {
  statusBox.className = 'status visible ' + type;
  statusBox.textContent = msg;
}

function hideStatus() { statusBox.className = 'status'; }

dropzone.addEventListener('click', () => fileInput.click());
fileInput.addEventListener('change', e => { if (e.target.files[0]) setFile(e.target.files[0]); });
fileRemove.addEventListener('click', e => { e.stopPropagation(); clearFile(); });
dropzone.addEventListener('dragover', e => { e.preventDefault(); dropzone.classList.add('drag-over'); });
dropzone.addEventListener('dragleave', () => dropzone.classList.remove('drag-over'));
dropzone.addEventListener('drop', e => {
  e.preventDefault();
  dropzone.classList.remove('drag-over');
  const file = e.dataTransfer.files[0];
  if (file && /\.xlsx?$/i.test(file.name)) setFile(file);
  else showStatus('error', 'Format invalide. Merci d\'importer un fichier .xlsx ou .xls');
});

btnGen.addEventListener('click', runGeneration);

// ── GREY DETECTION ──────────────────────────────────────────────
function isGreyRgb(rgb) {
  if (!rgb || rgb.length < 6) return false;
  const hex = rgb.length === 8 ? rgb.slice(2) : rgb;
  const r = parseInt(hex.slice(0,2),16);
  const g = parseInt(hex.slice(2,4),16);
  const b = parseInt(hex.slice(4,6),16);
  const spread = Math.max(r,g,b) - Math.min(r,g,b);
  return spread < 35 && !(r>230 && g>230 && b>230) && !(r<25 && g<25 && b<25);
}

function isGreyCell(cell) {
  if (!cell || !cell.s) return false;
  const s = cell.s;
  if (s.fgColor) {
    if (s.fgColor.rgb && isGreyRgb(s.fgColor.rgb)) return true;
    if ([0,1].includes(s.fgColor.theme) && s.fgColor.tint > 0.3) return true;
  }
  if (s.bgColor && s.bgColor.rgb && isGreyRgb(s.bgColor.rgb)) return true;
  return false;
}

function getCell(ws, r, c) { return ws[XLSX.utils.encode_cell({r,c})] || null; }

// ── BORDER PASS ─────────────────────────────────────────────────
// Applies a full border grid from B1 to F{endRow+1} (0-indexed rows 0→endRow)
function applyBorders(ws, endRow) {
  const T = { style: 'thin'   };
  const M = { style: 'medium' };
  for (let r = 0; r <= endRow; r++) {
    for (let c = 1; c <= 5; c++) {   // B=1 … F=5
      const addr = XLSX.utils.encode_cell({r, c});
      if (!ws[addr]) ws[addr] = { t: 'z', v: null };
      if (!ws[addr].s) ws[addr].s = {};
      ws[addr].s.border = {
        top:    r === 0      ? M : T,
        bottom: r === endRow ? M : T,
        left:   c === 1      ? M : T,
        right:  c === 5      ? M : T,
      };
    }
  }
}

// ── SIGNATURE MOVE ──────────────────────────────────────────────
function moveSigSection(ws, origStart, newStart) {
  if (newStart === origStart) return;
  const sigRows = 14, maxCols = 9;
  const cells = [];
  for (let r = 0; r < sigRows; r++)
    for (let c = 0; c < maxCols; c++) {
      const addr = XLSX.utils.encode_cell({r: origStart+r, c});
      cells.push({r, c, cell: ws[addr] ? JSON.parse(JSON.stringify(ws[addr])) : null});
      delete ws[addr];
    }
  for (const {r, c, cell} of cells)
    if (cell) ws[XLSX.utils.encode_cell({r: newStart+r, c})] = cell;

  if (ws['!merges'])
    ws['!merges'] = ws['!merges'].map(m => {
      if (m.s.r >= origStart && m.s.r < origStart + sigRows) {
        const off = newStart - origStart;
        return {s:{r:m.s.r+off,c:m.s.c}, e:{r:m.e.r+off,c:m.e.c}};
      }
      return m;
    });
}

// ── MAIN PROCESSING ─────────────────────────────────────────────
async function runGeneration() {
  if (!selectedFile) return;
  btnGen.disabled = true;
  hideStatus();
  setProgress(5, 'Chargement de la trame...');

  try {
    // 1. Load template
    const tmplWb = XLSX.read(TEMPLATE_B64, {type:'base64', cellStyles:true, cellDates:true, cellNF:true});
    const ws = tmplWb.Sheets['DEVIS'];

    setProgress(20, 'Lecture du fichier devis...');

    // 2. Load input
    const buf = await selectedFile.arrayBuffer();
    const inputWb = XLSX.read(new Uint8Array(buf), {type:'array', cellStyles:true, cellDates:true});
    const inputWs = inputWb.Sheets[inputWb.SheetNames[0]];
    const inputRange = XLSX.utils.decode_range(inputWs['!ref']);

    setProgress(40, 'Analyse des cellules...');

    // 3. Header rows: B1 ← C1, B2 ← C2 (row 0 and 1, col C = index 2)
    const c1 = getCell(inputWs, 0, 2); // C1
    const c2 = getCell(inputWs, 1, 2); // C2
    if (c1 && c1.v != null) { ws['B1'] = { ...(ws['B1']||{}), t: c1.t, v: c1.v }; }
    if (c2 && c2.v != null) { ws['B2'] = { ...(ws['B2']||{}), t: c2.t, v: c2.v }; }

    setProgress(55, 'Injection des données...');

    // 4. Data rows — input starts row 7 (0-indexed = 6)
    // Mappings:
    //   Col B output ← Col C input  (index 2)  — grey skip applies
    //   Col C output ← Col D input  (index 3)  — U
    //   Col D output ← Col E input  (index 4)  — Qté
    //   Col E output ← Col F input  (index 5)  — P.U. H.T.
    //   Col F output = formula =Dx*Ex           — TOTAL
    // Grey detection uses col C input

    let outRow = 4; // 0-indexed → excel row 5
    let lastDataRow = 4;

    for (let inRow = 6; inRow <= inputRange.e.r; inRow++) {
      const cCell = getCell(inputWs, inRow, 2); // col C
      const fInputCell = getCell(inputWs, inRow, 5); // col F input — check for "total"

      // Stop importing if col F contains "total"
      if (fInputCell && fInputCell.v != null &&
          String(fInputCell.v).trim().toLowerCase() === 'total') break;

      const grey = isGreyCell(cCell);

      if (!grey) {
        const dCell = getCell(inputWs, inRow, 3);  // D → C out (U)
        const eCell = getCell(inputWs, inRow, 4);  // E → D out (Qté)
        const fCell = getCell(inputWs, inRow, 5);  // F → E out (P.U.)

        const excelRow = outRow + 1; // 1-indexed

        // Col B ← C input
        if (cCell && cCell.v != null) {
          const a = XLSX.utils.encode_cell({r: outRow, c: 1});
          ws[a] = {...(ws[a]||{}), t: cCell.t, v: cCell.v};
          if (cCell.w) ws[a].w = cCell.w;
          lastDataRow = outRow;
        }

        // Col C ← D input (U)
        if (dCell && dCell.v != null) {
          const a = XLSX.utils.encode_cell({r: outRow, c: 2});
          ws[a] = {...(ws[a]||{}), t: dCell.t, v: dCell.v};
          if (dCell.w) ws[a].w = dCell.w;
          lastDataRow = outRow;
        }

        // Col D ← E input (Qté)
        if (eCell && eCell.v != null) {
          const a = XLSX.utils.encode_cell({r: outRow, c: 3});
          ws[a] = {...(ws[a]||{}), t: eCell.t, v: eCell.v};
          if (eCell.w) ws[a].w = eCell.w;
          lastDataRow = outRow;
        }

        // Col E ← F input (P.U. H.T.)
        if (fCell && fCell.v != null) {
          const a = XLSX.utils.encode_cell({r: outRow, c: 4});
          ws[a] = {...(ws[a]||{}), t: fCell.t, v: fCell.v};
          if (fCell.w) ws[a].w = fCell.w;
          lastDataRow = outRow;
        }

        // Col F = formula D*E (only if Qté or P.U. has a value)
        if ((eCell && eCell.v != null) || (fCell && fCell.v != null)) {
          const a = XLSX.utils.encode_cell({r: outRow, c: 5});
          ws[a] = {...(ws[a]||{}), t: 'f', f: `D${excelRow}*E${excelRow}`};
          delete ws[a].v;
          lastDataRow = outRow;
        }
      }
      // grey rows still consume an output row (preserves spacing)
      outRow++;
    }

    setProgress(72, 'Positionnement de la section signature...');

    // 5. Move signature section
    const origSigStart = 425; // 0-indexed row 426
    const newSigStart  = lastDataRow + 3;
    moveSigSection(ws, origSigStart, newSigStart);

    // 6. Update formulas in signature section
    const totalExcelRow = lastDataRow + 1;
    const rTotal = newSigStart;
    const rTVA   = newSigStart + 1;
    const rTTC   = newSigStart + 2;

    const addrTotal = XLSX.utils.encode_cell({r: rTotal, c: 5});
    const addrTVAf  = XLSX.utils.encode_cell({r: rTVA,  c: 5});
    const addrTTCf  = XLSX.utils.encode_cell({r: rTTC,  c: 5});

    if (ws[addrTotal]) { ws[addrTotal].t='f'; ws[addrTotal].f=`SUM(F5:F${totalExcelRow})`; delete ws[addrTotal].v; }
    if (ws[addrTVAf])  { ws[addrTVAf].t='f';  ws[addrTVAf].f=`F${rTotal+1}*E${rTVA+1}`;   delete ws[addrTVAf].v; }
    if (ws[addrTTCf])  { ws[addrTTCf].t='f';  ws[addrTTCf].f=`F${rTotal+1}+F${rTVA+1}`;   delete ws[addrTTCf].v; }

    // 7. Update date (7 rows into sig section = row index newSigStart+6)
    const dateAddr = XLSX.utils.encode_cell({r: newSigStart+6, c: 4});
    const today = new Date();
    ws[dateAddr] = {t:'d', v: today, z:'dd/mm/yyyy'};

    // 8. Apply borders in one pass: B1 → F{last row of sig section}
    const borderEndRow = newSigStart + 13;
    applyBorders(ws, borderEndRow);

    // 9. Update sheet ref
    ws['!ref'] = `A1:I${newSigStart + 14}`;

    setProgress(90, 'Génération du fichier...');

    const output = XLSX.write(tmplWb, {bookType:'xlsx', type:'array', cellStyles:true});
    const blob = new Blob([output], {type:'application/vnd.openxmlformats-officedocument.spreadsheetml.sheet'});
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = `Devis ${selectedFile.name.replace(/\.[^.]+$/,'')}_.xlsx`;
    document.body.appendChild(a); a.click(); document.body.removeChild(a);
    URL.revokeObjectURL(url);

    setTimeout(() => {
      hideProgress();
      showStatus('success', `✓ Export généré — ${outRow - 4} lignes traitées.`);
      btnGen.disabled = false;
    }, 400);

  } catch (err) {
    hideProgress();
    showStatus('error', 'Erreur : ' + err.message);
    console.error(err);
    btnGen.disabled = false;
  }
}
</script>
</body>
</html>
